spring.application.name=order-management-java
server.port=8080

spring.datasource.url=jdbc:sqlserver://MESBA;databaseName=SeaFishSupplyDb;encrypt=true;trustServerCertificate=true;integratedSecurity=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.h2.console.enabled=false

# If Windows trusted connection is not available from Java on your machine,
# replace the datasource settings above with SQL Server username/password:
# spring.datasource.url=jdbc:sqlserver://Mesba;databaseName=SeaFishSupplyDb;encrypt=true;trustServerCertificate=true
# spring.datasource.username=YOUR_DB_USER
# spring.datasource.password=YOUR_DB_PASSWORD
