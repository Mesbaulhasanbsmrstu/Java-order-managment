<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Order Details')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="app-shell">
    <div class="page-title">
        <h1 th:text="'Order #' + ${order.id}">Order</h1>
        <a class="btn btn-outline-secondary" th:href="@{/orders}">Back</a>
    </div>

    <section class="panel">
        <div class="row">
            <div class="col-md-3"><strong>Customer</strong><br><span th:text="${order.customer.name}">Customer</span></div>
            <div class="col-md-3"><strong>Order Date</strong><br><span th:text="${order.orderDate}">Date</span></div>
            <div class="col-md-3"><strong>Delivery Date</strong><br><span th:text="${order.deliveryDate}">Date</span></div>
            <div class="col-md-3"><strong>Status</strong><br><span class="badge-status" th:text="${order.status}">CONFIRMED</span></div>
        </div>
        <div class="mt-3">
            <strong>Delivery Address</strong><br>
            <span th:text="${order.deliveryAddress}">Address</span>
        </div>
    </section>

    <section class="panel">
        <h2 class="h5 mb-3">Items</h2>
        <table class="table table-sm">
            <thead><tr><th>Fish</th><th class="text-end">Kg</th><th class="text-end">Unit Price</th><th class="text-end">Line Total</th></tr></thead>
            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.fishProduct.name}">Fish</td>
                <td class="text-end" th:text="${#numbers.formatDecimal(item.quantityKg, 1, 2)}">0.00</td>
                <td class="text-end" th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</td>
                <td class="text-end" th:text="${#numbers.formatDecimal(item.lineTotal, 1, 2)}">0.00</td>
            </tr>
            </tbody>
            <tfoot>
            <tr><th colspan="3" class="text-end">Total</th><th class="text-end" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</th></tr>
            </tfoot>
        </table>
    </section>

    <section class="panel form-wrap">
        <h2 class="h5 mb-3">Update Status</h2>
        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-2">
            <select class="form-select" name="status">
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == order.status}">Status</option>
            </select>
            <button class="btn btn-primary" type="submit">Update</button>
        </form>
    </section>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
