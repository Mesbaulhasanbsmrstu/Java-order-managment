<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Customer')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="app-shell form-wrap">
    <div class="page-title">
        <h1>Add Customer</h1>
        <a class="btn btn-outline-secondary" th:href="@{/customers}">Back</a>
    </div>
    <form th:action="@{/customers/create}" th:object="${customer}" method="post" class="panel">
        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" id="name" th:field="*{name}">
            <div class="text-danger" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="phone">Phone</label>
            <input class="form-control" id="phone" th:field="*{phone}">
            <div class="text-danger" th:errors="*{phone}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="address">Address</label>
            <input class="form-control" id="address" th:field="*{address}">
            <div class="text-danger" th:errors="*{address}"></div>
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
    </form>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
